<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentrix Light Fluid Study</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Michroma&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap"
    />
    <link rel="stylesheet" href="styles.css?v=20260325-hud-single-2" />
  </head>
  <body>
    <div id="front-anim" class="app-shell">
      <div class="scene" aria-hidden="true">
        <div class="scene__backdrop"></div>
        <div class="scene__beams">
          <span class="scene__beam scene__beam--1"></span>
          <span class="scene__beam scene__beam--2"></span>
          <span class="scene__beam scene__beam--3"></span>
          <span class="scene__beam scene__beam--4"></span>
          <span class="scene__beam scene__beam--5"></span>
        </div>
        <canvas id="p-front-bg-anim"></canvas>
        <div class="scene__grain"></div>
        <div class="scene__veil"></div>
      </div>

      <aside class="hud" aria-label="Fluid control HUD">
        <section class="hud__panel hud__panel--shell">
          <div class="hud__head">
            <p class="hud__title">ash</p>
            <span id="motion-state" class="visually-hidden">Fluid enabled</span>
          </div>

          <div class="hud__row hud__row--toggles">
            <button
              type="button"
              class="hud__toggle"
              data-action="theme"
              data-control-button="theme"
              data-state="dark"
              aria-label="Toggle theme"
            >
              <span class="hud__toggle-track" aria-hidden="true"></span>
              <span class="hud__toggle-value" data-control-value="theme">Dark</span>
            </button>
            <button
              type="button"
              class="hud__toggle"
              data-action="colorMode"
              data-control-button="colorMode"
              data-state="white"
              aria-label="Toggle color mode"
            >
              <span class="hud__toggle-track" aria-hidden="true"></span>
              <span class="hud__toggle-value" data-control-value="colorMode">White</span>
            </button>
            <div class="hud__swatches" aria-hidden="true">
              <span style="--swatch: #fac800"></span>
              <span style="--swatch: #003287"></span>
              <span style="--swatch: #f06400"></span>
              <span style="--swatch: #e60014"></span>
              <span style="--swatch: #be0000"></span>
              <span style="--swatch: #2da037"></span>
            </div>
          </div>

          <section class="hud__controls" aria-label="Fluid parameters">
            <button
              type="button"
              class="hud__dial"
              data-action="radius"
              data-control-button="radius"
              data-state="mid"
            >
              <span class="hud__label">Radius</span>
              <span class="hud__dial-level" data-control-level="radius">Mid</span>
              <span id="value-radius" class="hud__dial-value">0.20</span>
            </button>

            <button
              type="button"
              class="hud__dial"
              data-action="force"
              data-control-button="force"
              data-state="mid"
            >
              <span class="hud__label">Force</span>
              <span class="hud__dial-level" data-control-level="force">Mid</span>
              <span id="value-force" class="hud__dial-value">6000</span>
            </button>

            <button
              type="button"
              class="hud__dial"
              data-action="density"
              data-control-button="density"
              data-state="mid"
            >
              <span class="hud__label">Density</span>
              <span class="hud__dial-level" data-control-level="density">Mid</span>
              <span id="value-density" class="hud__dial-value">4.5</span>
            </button>

            <button
              type="button"
              class="hud__dial"
              data-action="curl"
              data-control-button="curl"
              data-state="mid"
            >
              <span class="hud__label">Curl</span>
              <span class="hud__dial-level" data-control-level="curl">Mid</span>
              <span id="value-curl" class="hud__dial-value">3.0</span>
            </button>
          </section>
        </section>
      </aside>
    </div>
    <script src="main.js?v=20260325-hud-single-2"></script>
  </body>
</html>

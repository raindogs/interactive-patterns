<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fourier Transform Visualizer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="hero">
        <p class="eyebrow">Interactive Signal Lab</p>
        <h1>フーリエ変換の可視化</h1>
        <p class="lead">
          時間領域・周波数領域・回転ベクトルを同時に描画し、信号がどの周波数成分で構成されるかを直感的に観察する。
        </p>
      </header>

      <section class="controls" aria-label="control panel">
        <label>
          波形
          <select id="waveform">
            <option value="sine">Sine</option>
            <option value="square" selected>Square</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="triangle">Triangle</option>
            <option value="pulse">Pulse</option>
            <option value="chirp">Chirp</option>
          </select>
        </label>

        <label>
          サンプル数
          <select id="sampleCount">
            <option value="32">32</option>
            <option value="64">64</option>
            <option value="128" selected>128</option>
            <option value="256">256</option>
          </select>
        </label>

        <label>
          表示高調波 <span id="harmonicsValue">12</span>
          <input id="harmonics" type="range" min="1" max="64" value="12" step="1" />
        </label>

        <label>
          再生速度 <span id="speedValue">1.00</span>
          <input id="speed" type="range" min="0" max="2" value="1" step="0.01" />
        </label>

        <button id="togglePlayback" type="button" aria-pressed="true">Pause</button>
      </section>

      <section class="visual-grid">
        <article class="panel">
          <h2>時間領域</h2>
          <canvas id="signalCanvas" aria-label="time domain signal"></canvas>
          <p class="caption">白線: 元信号 / 橙線: 高調波再構成 / 垂線: 現在位相</p>
        </article>

        <article class="panel">
          <h2>周波数領域</h2>
          <canvas id="spectrumCanvas" aria-label="frequency spectrum"></canvas>
          <p class="caption">棒の高さが振幅。強い成分ほど色が濃く表示される。</p>
        </article>

        <article class="panel panel-wide">
          <h2>エピサイクル再構成</h2>
          <canvas id="epicycleCanvas" aria-label="epicycle reconstruction"></canvas>
          <p class="caption">左: 回転ベクトル連鎖 / 右: その合成波形</p>
        </article>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailored Stripe Drift</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-label="Vivid tailored stripe interaction"></canvas>

    <header class="hud">
      <p class="eyebrow">Interactive Study / PaulSmithy Motif</p>
      <h1>Tailored Stripe Drift</h1>
      <p class="description">
        カラフルなストライプを布のようにしならせる習作です。ポインタ移動で流れを作り、タップ/クリックで波形のパルスを走らせます。
      </p>
      <div class="meta">
        <span id="energyLabel">Energy: 0.00</span>
        <span id="modeLabel">Mode: glide</span>
      </div>
      <div class="actions">
        <button id="shuffleBtn" type="button">Shuffle Tone</button>
        <button id="pulseBtn" type="button">Pulse</button>
      </div>
    </header>

    <script src="main.js"></script>
  </body>
</html>
